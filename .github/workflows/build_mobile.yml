name: Compilación de Flutter (Android & iOS)

on:
  push:
    branches:
      - main

jobs:
  # Task 1: Compilación para Android
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar el entorno de Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias del pubspec.yaml
        run: flutter pub get

      - name: Crear archivo .env desde GitHub Secrets
        run: |
          echo "${{ secrets.ENV_CONTENT }}" > .env

      - name: Compilar APK (Modo Release)
        run: flutter build apk --release

      - name: Guardar el APK como artefacto de descarga
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # Task 2: Compilación para iOS
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar el entorno de Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias del pubspec.yaml
        run: flutter pub get

      - name: Crear archivo .env desde GitHub Secrets
        run: |
          echo "${{ secrets.ENV_CONTENT }}" > .env

      - name: Compilar IPA de iOS (Sin Firmar)
        run: flutter build ipa --no-codesign

      - name: Guardar la carpeta de iOS como artefacto de descarga
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-release
          path: build/ios/ipa/
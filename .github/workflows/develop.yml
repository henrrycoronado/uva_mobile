name: Validación Develop (CI)

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  validate:
    name: Validar Código (Format, Lint & Sec)
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar Formato de Código
        run: dart format --output=none --set-exit-if-changed .

      - name: Analizar Código (Linter)
        run: flutter analyze

      - name: Escaneo de Vulnerabilidades (OSV)
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.0
        with:
          scan-args: |-
            --lockfile=pubspec.lock

  build-test:
    name: Prueba de Buildeo Android
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Crear archivo .env desde GitHub Secrets
        run: echo "${{ secrets.ENV_CONTENT }}" > .env

      - name: Compilar APK (Modo Debug)
        # Solo verificamos que compile correctamente
        run: flutter build apk --debug
